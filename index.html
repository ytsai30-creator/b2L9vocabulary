<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unit 9 英語互動站 - 垂直農業單字學習</title>
    <style>
        :root { --primary:#2ECC71; --secondary:#F5A623; --success:#27AE60; --danger:#FF5E5E; --bg:#F4F9F4; --quiz-purple:#6C63FF; --dark:#333; }
        * { touch-action:manipulation; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); margin:0; display:flex; flex-direction:column; align-items:center; min-height:100vh; overflow-x:hidden; }
        nav { width:100%; background:white; box-shadow:0 2px 8px rgba(0,0,0,0.1); display:flex; justify-content:center; gap:4px; padding:12px 5px; position:sticky; top:0; z-index:100; }
        .nav-btn { flex:1; max-width:85px; padding:10px 0; border-radius:12px; border:2px solid var(--primary); background:transparent; color:var(--primary); font-weight:bold; font-size:0.8rem; cursor:pointer; text-align:center; transition:0.2s; }
        .nav-btn.active { background:var(--primary); color:white; }
        .container { width:95%; max-width:650px; margin-top:15px; display:none; flex-direction:column; align-items:center; padding-bottom:50px; }
        .container.active { display:flex; }
        .flip-card { background-color:transparent; width:100%; height:580px; perspective:1000px; margin-bottom:15px; cursor:pointer; }
        .flip-card-inner { position:relative; width:100%; height:100%; text-align:center; transition:transform 0.6s; transform-style:preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform:rotateY(180deg); }
        .flip-card-front, .flip-card-back { position:absolute; width:100%; height:100%; -webkit-backface-visibility:hidden; backface-visibility:hidden; border-radius:25px; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:28px 22px; box-shadow:0 10px 20px rgba(0,0,0,0.08); border:1px solid #eee; overflow-y:auto; }
        .flip-card-front { background-color:white; }
        .flip-card-back { background-color:white; transform:rotateY(180deg); }
        .word { font-size:2.8rem; color:var(--primary); font-weight:bold; margin-bottom:8px; }
        .counter { color:#aaa; font-size:0.9rem; margin-bottom:6px; }
        .sense-row { width:100%; text-align:left; margin-bottom:10px; padding:11px 15px; background:#f2fcf5; border-radius:12px; border-left:4px solid var(--primary); }
        .sense-pos { display:inline-block; background:#d5f5e3; color:var(--success); border-radius:20px; padding:3px 12px; font-size:0.88rem; font-weight:700; margin-bottom:5px; }
        .sense-def { font-size:1.1rem; color:#444; line-height:1.55; font-style:italic; }
        .hint-flip { color:#bbb; font-size:0.88rem; margin-top:14px; }
        .back-sense { width:100%; text-align:left; margin-bottom:10px; padding:11px 15px; background:#f2fcf5; border-radius:12px; border-left:4px solid var(--primary); }
        .back-pos { display:inline-block; background:#d5f5e3; color:var(--success); border-radius:20px; padding:3px 12px; font-size:0.86rem; font-weight:700; margin-bottom:5px; }
        .back-def-ch { font-size:1.25rem; color:#222; font-weight:bold; margin-bottom:5px; }
        .back-example { font-size:0.97rem; color:#555; line-height:1.55; font-style:italic; }
        .extra-info { font-size:1.02rem; color:var(--dark); background:#fdf2e9; padding:12px 15px; border-radius:14px; width:100%; margin-top:10px; text-align:left; border:1px solid var(--secondary); }
        #match-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; }
        .match-item { background:white; border:2px solid #E5E7EB; border-radius:12px; min-height:88px; display:flex; align-items:center; justify-content:center; font-size:0.95rem; font-weight:bold; cursor:pointer; text-align:center; padding:8px; transition:0.2s; user-select:none; white-space:pre-line; }
        .match-item.selected { border-color:var(--primary); background:#E8F8F5; }
        .match-item.correct { visibility:hidden !important; opacity:0 !important; pointer-events:none !important; }
        .match-item.wrong { background:var(--danger) !important; color:white !important; border-color:var(--danger) !important; }
        .btn-main { width:100%; min-height:55px; border-radius:15px; font-size:1.1rem; font-weight:bold; margin-bottom:12px; cursor:pointer; border:none; transition:0.15s; }
        .btn-main:active { opacity:0.85; transform:scale(0.98); }
        .feedback { min-height:42px; margin-top:8px; font-weight:bold; font-size:1.15rem; text-align:center; }
        .quiz-audio-btn { width:88px; height:88px; background:var(--quiz-purple); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.4rem; margin:8px auto 16px; border:none; cursor:pointer; box-shadow:0 4px 15px rgba(108,99,255,0.3); transition:0.15s; }
        .quiz-audio-btn:active { transform:scale(0.95); }
        .quiz-options { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; }
        .option-btn { background:white; border:2px solid #E5E7EB; border-radius:15px; padding:13px 8px; font-size:0.95rem; cursor:pointer; min-height:70px; color:#333; font-weight:500; transition:0.15s; }
        .option-btn:hover { border-color:var(--primary); background:#f0fdf4; }
        .report-item { width:100%; display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid #EEE; }
        .report-label { font-weight:bold; color:#555; font-size:1rem; }
        .report-val { color:var(--primary); font-weight:800; font-size:1.05rem; }
        .tip-box { background:#e8f8ee; border:1px solid #a8e6bf; border-radius:12px; padding:10px 14px; width:100%; font-size:0.88rem; color:#2d6a4f; margin-bottom:12px; }
    </style>
</head>
<body>
<nav>
    <button class="nav-btn active" onclick="showPage('learn')">Learn</button>
    <button class="nav-btn" onclick="showPage('game')">Game</button>
    <button class="nav-btn" onclick="showPage('quiz')">Quiz</button>
    <button class="nav-btn" onclick="showPage('match')">Match</button>
    <button class="nav-btn" onclick="showPage('report')">Report</button>
</nav>

<!-- LEARN -->
<div id="learn" class="container active">
    <div class="tip-box">💡 點擊卡片翻面，看中文釋義與例句！</div>
    <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner" id="learn-card-inner"></div>
    </div>
    <div id="listen-btn-container"></div>
    <button class="btn-main" style="background:var(--primary);color:white;" onclick="handlePractice();event.stopPropagation();">🎤 Practice（開口練）</button>
    <div id="learn-feedback" class="feedback"></div>
    <button class="btn-main" style="background:var(--dark);color:white;" onclick="nextLearnWord();event.stopPropagation();">Next 單字 →</button>
</div>

<!-- GAME -->
<div id="game" class="container">
    <div style="background:white;border-radius:20px;padding:20px;width:100%;text-align:center;box-shadow:0 8px 15px rgba(0,0,0,0.05);">
        <div style="display:flex;justify-content:space-between;font-weight:bold;margin-bottom:16px;width:100%;">
            <span>Score: <span id="game-score-display">0</span></span>
            <span style="color:var(--danger);">Time: <span id="game-time-display">60</span>s</span>
        </div>
        <div style="font-size:0.85rem;color:#888;margin-bottom:8px;">看到單字，大聲唸出來！</div>
        <div id="game-word-display" class="word" style="margin:30px 0;">READY?</div>
        <div id="game-feedback" class="feedback"></div>
    </div>
    <button id="game-start-btn" class="btn-main" style="background:var(--success);color:white;margin-top:20px;" onclick="startGame()">▶ START CHALLENGE</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="container">
    <div style="background:white;border-radius:20px;padding:20px;width:100%;text-align:center;box-shadow:0 8px 15px rgba(0,0,0,0.05);" id="quiz-main-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;font-weight:bold;color:#666;width:100%;">
            <span>題號: <span id="quiz-num">1</span> / 10</span>
            <span>得分: <span id="quiz-score-display">0</span></span>
        </div>
        <div style="font-size:0.8rem;color:#999;margin-bottom:4px;">聽音後選出正確中文意思</div>
        <button class="quiz-audio-btn" onclick="playQuizAudio()">🔊</button>
        <div id="quiz-word-hint" style="font-size:0.88rem;color:#bbb;margin-bottom:12px;font-style:italic;min-height:18px;"></div>
        <div id="quiz-options" class="quiz-options"></div>
    </div>
    <div id="quiz-feedback" class="feedback"></div>
    <button id="quiz-retry-btn" class="btn-main" style="background:var(--primary);color:white;display:none;" onclick="startQuizSession()">🔄 Restart Quiz</button>
</div>

<!-- MATCH -->
<div id="match" class="container">
    <div style="background:white;border-radius:20px;padding:20px;width:100%;text-align:center;box-shadow:0 8px 15px rgba(0,0,0,0.05);">
        <div style="display:flex;justify-content:space-between;font-weight:bold;margin-bottom:10px;">
            <span>Match Game</span>
            <span style="color:var(--primary);">⏱ <span id="match-timer">0</span>s</span>
        </div>
        <p style="font-size:0.9rem;color:var(--dark);margin:0 0 3px;font-weight:800;">配對單字與其同義字</p>
        <p style="font-size:0.8rem;color:#888;margin:0 0 14px;">Match each word with its synonym</p>
        <div id="match-grid"></div>
    </div>
    <button id="match-start-btn" class="btn-main" style="background:var(--success);color:white;margin-top:20px;" onclick="startMatchGame()">▶ 開始挑戰</button>
    <div id="match-feedback" class="feedback"></div>
</div>

<!-- REPORT -->
<div id="report" class="container">
    <div style="background:white;border-radius:20px;padding:22px;width:100%;box-shadow:0 8px 15px rgba(0,0,0,0.05);">
        <h2 style="margin-top:0;color:var(--dark);">📊 Progress Report</h2>
        <div class="report-item"><span class="report-label">📖 已學單字數</span><span class="report-val"><span id="words-seen">0</span> / <span id="words-total">0</span></span></div>
        <div class="report-item"><span class="report-label">🎮 Game 最高分</span><span class="report-val"><span id="best-game">0</span> 分</span></div>
        <div class="report-item"><span class="report-label">📝 Quiz 最高得分</span><span class="report-val"><span id="best-quiz">0</span> / 100</span></div>
        <div class="report-item"><span class="report-label">🔗 Match 最快紀錄</span><span class="report-val"><span id="best-match">--</span> 秒</span></div>
    </div>
    <div style="background:white;border-radius:20px;padding:20px;width:100%;margin-top:14px;box-shadow:0 8px 15px rgba(0,0,0,0.05);">
        <h3 style="margin-top:0;color:var(--dark);">📚 Unit 9 單字總覽</h3>
        <div id="word-list-summary" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
    </div>
</div>

// ── State ──────────────────────────────────────────────────────────────────
var learnIdx=0, wordsSeen=new Set(), gameActive=false, gameScore=0;
var bestScores={game:0,quiz:0,match:null};
var quizSession={num:1,score:0,curTarget:null};
var quizUsed=[], matchUsed=[];
var SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition||null;
var mainRec=null;
if(SpeechRec){try{mainRec=new SpeechRec();mainRec.lang='en-US';mainRec.interimResults=false;}catch(e){}}

// ── NAV ────────────────────────────────────────────────────────────────────
function showPage(id){
    document.querySelectorAll('.container').forEach(function(c){c.classList.remove('active');});
    document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
    document.getElementById(id).classList.add('active');
    var labels=['learn','game','quiz','match','report'];
    document.querySelectorAll('.nav-btn').forEach(function(b,i){if(labels[i]===id)b.classList.add('active');});
    window.speechSynthesis.cancel(); gameActive=false; clearInterval(window.matchInt);
    if(mainRec){try{mainRec.stop();}catch(e){}}
    if(id==='learn') updateLearn();
    if(id==='quiz') startQuizSession();
    if(id==='report') updateReport();
}

// ── TTS fallback ───────────────────────────────────────────────────────────
function tts(word){
    var u=new SpeechSynthesisUtterance(word); u.lang='en-US'; u.rate=0.85;
    window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
}

// ── CARD BUILDER ──────────────────────────────────────────────────────────
function buildCard(d, idx){
    var frontSenses = d.senses.map(function(s){
        // pron may contain HTML bold tags — render as innerHTML
        var pronHtml = s.pron ? ' <span style="font-style:italic;font-weight:400;font-size:1.05em;letter-spacing:0.02em;">'+s.pron+'</span>' : '';
        return '<div class="sense-row"><div class="sense-pos" style="font-size:0.95rem;">'+s.pos+pronHtml+'</div><div class="sense-def">'+s.def_en+'</div></div>';
    }).join('');
    var backSenses = d.senses.map(function(s){
        var pronHtml = s.pron ? ' <span style="font-style:italic;font-weight:400;font-size:1.05em;letter-spacing:0.02em;">'+s.pron+'</span>' : '';
        return '<div class="back-sense"><div class="back-pos" style="font-size:0.95rem;">'+s.pos+pronHtml+'</div><div class="back-def-ch">'+s.def_ch+'</div><div class="back-example">📝 '+s.example_en+'</div></div>';
    }).join('');
    return '<div class="flip-card-front"><div class="counter">'+(idx+1)+' / '+vocabulary.length+'</div><div class="word">'+d.word+'</div>'+frontSenses+'<div class="hint-flip">點擊翻面看中文 ↩</div></div>'
        +'<div class="flip-card-back"><div class="counter">'+(idx+1)+' / '+vocabulary.length+'</div><div class="word" style="font-size:2.3rem;">'+d.word+'</div>'+backSenses+'<div class="extra-info"><div>📖 <strong>Synonyms 同義字</strong>: '+d.syn+'</div><div style="margin-top:6px;">🔄 <strong>Antonyms 反義字</strong>: '+d.ant+'</div></div></div>';
}

// ── LISTEN BUTTONS ─────────────────────────────────────────────────────────
function renderListenButtons(){
    var d = vocabulary[learnIdx];
    var c = document.getElementById('listen-btn-container');
    if(!c) return;
    c.innerHTML = '';
    var btn = document.createElement('button');
    btn.className='btn-main';
    btn.style.cssText='background:var(--secondary);color:white;';
    btn.textContent = '\uD83D\uDD0A Listen\uff08\u807d\u97f3\uff09';
    btn.addEventListener('click', function(e){ e.stopPropagation(); speakEntry(vocabulary[learnIdx]); });
    c.appendChild(btn);
}

// ── AUDIO PLAYER ──────────────────────────────────────────────────────────
function speakEntry(d){
    window.speechSynthesis.cancel();
    var key = d.listenKey || null;
    if(key && _audioEls[key]){
        var el = _audioEls[key];
        el.currentTime = 0;
        el.play().catch(function(){ tts(d.word); });
        return;
    }
    tts(d.word);
}

// ── LEARN ──────────────────────────────────────────────────────────────────
function updateLearn(){
    var d=vocabulary[learnIdx]; wordsSeen.add(learnIdx);
    var card=document.querySelector('.flip-card'); if(card) card.classList.remove('flipped');
    document.getElementById('learn-card-inner').innerHTML=buildCard(d,learnIdx);
    document.getElementById('learn-feedback').innerText='';
    renderListenButtons();
}
function nextLearnWord(){ learnIdx=(learnIdx+1)%vocabulary.length; updateLearn(); }

function getDiffHtml(target,input){
    var html='';
    for(var i=0;i<target.length;i++){
        if((input[i]||'').toLowerCase()===target[i].toLowerCase()) html+=target[i];
        else html+='<span style="color:var(--danger);text-decoration:underline;font-weight:900;">'+target[i]+'</span>';
    }
    return html;
}
function handlePractice(){
    if(!mainRec){alert('此瀏覽器不支援語音辨識，請使用 Chrome。');return;}
    var fb=document.getElementById('learn-feedback'); fb.innerText='Listening... 🎤'; fb.style.color='#888';
    mainRec.onresult=function(e){
        var text=e.results[0][0].transcript.toLowerCase().trim();
        var target=vocabulary[learnIdx].word.toLowerCase();
        if(text.includes(target)){fb.innerText='Great job! ✨';fb.style.color='var(--success)';}
        else{fb.innerHTML='Try again! ❌<br><small style="color:#666;">Correct: '+getDiffHtml(target,text)+'</small>';fb.style.color='var(--danger)';}
    };
    mainRec.onerror=function(){fb.innerText='無法辨識，請再試';fb.style.color='var(--danger)';};
    try{mainRec.start();}catch(e){}
}

// ── GAME ───────────────────────────────────────────────────────────────────
function startGame(){
    if(!mainRec){alert('此瀏覽器不支援語音辨識。');return;}
    gameActive=true; gameScore=0; var time=60;
    document.getElementById('game-score-display').innerText='0';
    document.getElementById('game-start-btn').style.display='none';
    document.getElementById('game-feedback').innerText='';
    var timer=setInterval(function(){
        time--; document.getElementById('game-time-display').innerText=time;
        if(time<=0||!gameActive){
            clearInterval(timer); gameActive=false; try{mainRec.stop();}catch(e){}
            if(gameScore>bestScores.game) bestScores.game=gameScore;
            document.getElementById('game-start-btn').style.display='block';
            document.getElementById('game-word-display').innerText='TIME UP! 🎉';
            document.getElementById('game-feedback').innerText='最終得分: '+gameScore+' 分';
        }
    },1000);
    loadNextGameWord();
}
function loadNextGameWord(){
    if(!gameActive) return;
    var entry=vocabulary[Math.floor(Math.random()*vocabulary.length)];
    var isDup=vocabulary.filter(function(v){return v.word===entry.word;}).length>1;
    var posLabel=entry.senses[0].pos;
    var displayText=isDup ? entry.word+'\n('+posLabel+')' : entry.word;
    var wordEl=document.getElementById('game-word-display');
    wordEl.style.whiteSpace='pre-line';
    wordEl.style.fontSize=isDup?'2.2rem':'2.8rem';
    wordEl.innerText=displayText;
    document.getElementById('game-feedback').innerText='';
    speakEntry(entry);
    mainRec.onresult=function(e){
        var said=e.results[0][0].transcript.toLowerCase();
        if(said.includes(entry.word.toLowerCase())){
            gameScore+=10; document.getElementById('game-score-display').innerText=gameScore;
            document.getElementById('game-feedback').innerText='✅ +10';
            loadNextGameWord();
        }
    };
    mainRec.onend=function(){if(gameActive)try{mainRec.start();}catch(e){}};
    try{mainRec.start();}catch(e){}
}

// ── QUIZ ───────────────────────────────────────────────────────────────────
function startQuizSession(){
    quizUsed=[]; quizSession={num:1,score:0,curTarget:null};
    document.getElementById('quiz-retry-btn').style.display='none';
    document.getElementById('quiz-main-card').style.display='block';
    document.getElementById('quiz-feedback').innerText='';
    loadQuiz();
}
function loadQuiz(){
    var fb=document.getElementById('quiz-feedback');
    var container=document.getElementById('quiz-options');
    if(quizSession.num>10){
        if(quizSession.score>bestScores.quiz) bestScores.quiz=quizSession.score;
        fb.innerText='🎉 完成！得分 '+quizSession.score+'/100'; fb.style.color='var(--success)';
        document.getElementById('quiz-main-card').style.display='none';
        document.getElementById('quiz-retry-btn').style.display='block'; return;
    }
    document.getElementById('quiz-num').innerText=quizSession.num;
    document.getElementById('quiz-score-display').innerText=quizSession.score;
    fb.innerText='';
    var pool=vocabulary.filter(function(v){return !quizUsed.includes(v.word);});
    var target=pool[Math.floor(Math.random()*pool.length)];
    quizSession.curTarget=target; quizUsed.push(target.word);
    var correctDef=target.senses[0].def_ch;
    document.getElementById('quiz-word-hint').innerText='';
    setTimeout(function(){ var el=document.getElementById('quiz-word-hint'); if(el) el.innerText=target.word; },2000);
    var opts=[correctDef]; var attempts=0;
    while(opts.length<4&&attempts<80){
        var r=vocabulary[Math.floor(Math.random()*vocabulary.length)].senses[0].def_ch;
        if(!opts.includes(r)) opts.push(r); attempts++;
    }
    opts.sort(function(){return 0.5-Math.random();});
    container.innerHTML='';
    opts.forEach(function(opt){
        var b=document.createElement('button'); b.className='option-btn'; b.innerText=opt;
        b.onclick=function(){
            document.querySelectorAll('.option-btn').forEach(function(btn){btn.onclick=null;});
            if(opt===correctDef){
                b.style.background='#e8f8ee'; b.style.borderColor='var(--success)';
                quizSession.score+=10; document.getElementById('quiz-score-display').innerText=quizSession.score;
                fb.innerText='✅ Correct!'; fb.style.color='var(--success)';
            } else {
                b.style.background='#FFEBEE'; b.style.borderColor='var(--danger)';
                fb.innerText='❌ 正確答案: '+correctDef; fb.style.color='var(--danger)';
            }
            quizSession.num++; setTimeout(loadQuiz,1100);
        };
        container.appendChild(b);
    });
    speakEntry(target);
}
function playQuizAudio(){ if(quizSession.curTarget) speakEntry(quizSession.curTarget); }

// ── MATCH ──────────────────────────────────────────────────────────────────
function synRoot(s){
    var w=s.split(',')[0].trim().toLowerCase();
    return w.replace(/(ing|tion|ness|ment|ance|ence|ly|ed|er|est)$/,'');
}
function startMatchGame(){
    document.getElementById('match-start-btn').style.display='none';
    document.getElementById('match-feedback').innerText='';
    var mTime=0,matchesFound=0,firstCard=null,matchActive=true;
    clearInterval(window.matchInt);
    window.matchInt=setInterval(function(){mTime++;document.getElementById('match-timer').innerText=mTime;},1000);
    var fullPool=vocabulary.filter(function(v){return !matchUsed.includes(v.word+(v.pron||''));});
    if(fullPool.length<6){matchUsed=[];fullPool=vocabulary.slice();}
    fullPool.sort(function(){return 0.5-Math.random();});
    var sub=[], usedWords=new Set(), usedRoots=new Set();
    for(var i=0;i<fullPool.length&&sub.length<6;i++){
        var v=fullPool[i];
        if(usedWords.has(v.word)) continue;
        var root=synRoot(v.syn);
        if(usedRoots.has(root)) continue;
        sub.push(v); usedWords.add(v.word); usedRoots.add(root);
    }
    if(sub.length<6){
        for(var i=0;i<fullPool.length&&sub.length<6;i++){
            if(!sub.includes(fullPool[i])&&!usedWords.has(fullPool[i].word)){ sub.push(fullPool[i]); usedWords.add(fullPool[i].word); }
        }
    }
    sub.forEach(function(s){matchUsed.push(s.word+(s.pron||''));});
    var cards=[];
    sub.forEach(function(v){
        var label=v.pron ? v.word+'\n'+v.pron : v.word;
        cards.push({id:v.word+(v.pron||''),text:label});
        cards.push({id:v.word+(v.pron||''),text:v.syn.split(',')[0].trim()});
    });
    cards.sort(function(){return 0.5-Math.random();});
    var grid=document.getElementById('match-grid'); grid.innerHTML='';
    cards.forEach(function(item){
        var div=document.createElement('div'); div.className='match-item'; div.innerText=item.text;
        div.onclick=function(){
            if(!matchActive||div.classList.contains('correct')||div===firstCard?.div) return;
            div.classList.add('selected');
            if(!firstCard){firstCard={div:div,item:item};}
            else{
                if(firstCard.item.id===item.id){
                    div.classList.add('correct'); firstCard.div.classList.add('correct'); matchesFound++;
                    if(matchesFound===6){
                        clearInterval(window.matchInt);
                        if(!bestScores.match||mTime<bestScores.match) bestScores.match=mTime;
                        document.getElementById('match-feedback').innerText='🎉 完成！ '+mTime+' 秒';
                        document.getElementById('match-start-btn').style.display='block';
                    }
                    firstCard=null;
                } else {
                    matchActive=false; div.classList.add('wrong'); firstCard.div.classList.add('wrong');
                    setTimeout(function(){ div.classList.remove('selected','wrong'); firstCard.div.classList.remove('selected','wrong'); firstCard=null; matchActive=true; },700);
                }
            }
        };
        grid.appendChild(div);
    });
}

// ── REPORT ─────────────────────────────────────────────────────────────────
function updateReport(){
    document.getElementById('best-game').innerText=bestScores.game;
    document.getElementById('best-quiz').innerText=bestScores.quiz;
    document.getElementById('best-match').innerText=bestScores.match||'--';
    document.getElementById('words-seen').innerText=wordsSeen.size;
    document.getElementById('words-total').innerText=vocabulary.length;
    var listEl=document.getElementById('word-list-summary'); listEl.innerHTML='';
    vocabulary.forEach(function(v){
        var div=document.createElement('div');
        div.style.cssText='background:#f2fcf5;border-radius:10px;padding:8px 10px;font-size:0.85rem;';
        var allDefs=v.senses.map(function(s){return s.def_ch;}).join(' / ');
        div.innerHTML='<strong style="color:var(--primary);">'+v.word+'</strong><br><span style="color:#666;font-size:0.76rem;">'+allDefs+'</span>';
        listEl.appendChild(div);
    });
}

updateLearn();
